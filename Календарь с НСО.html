<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь с НСО</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-content {
            flex-grow: 1;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .print-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .print-btn:hover {
            background-color: #2980b9;
        }

        .app-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .calendar-section {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .notes-section {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .current-month {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .nav-button {
            background-color: #3498db;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.3s;
        }

        .nav-button:hover {
            background-color: #2980b9;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-name {
            text-align: center;
            padding: 10px;
            font-weight: 600;
            color: #7f8c8d;
        }

        .day-name.weekend {
            color: #e74c3c;
        }

        .day-cell {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }

        .day-cell:hover {
            background-color: #e8f4fc;
            transform: translateY(-2px);
        }

        .day-cell.today {
            background-color: #e1f5fe;
            border: 2px solid #3498db;
        }

        .day-cell.selected {
            background-color: #3498db;
            color: white;
        }

        .day-cell.weekend {
            background-color: #fff5f5;
        }

        .day-cell.weekend:hover {
            background-color: #ffeaea;
        }

        .day-cell.weekend.selected {
            background-color: #e74c3c;
            color: white;
        }

        .day-cell.weekend.today {
            background-color: #ffeaea;
            border: 2px solid #e74c3c;
        }

        .day-number {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .shift {
            font-size: 0.7rem;
            color: #555;
            margin-top: 2px;
            font-weight: normal;
        }

        .day-cell.selected .shift {
            color: #e0e0e0;
        }

        .day-cell.weekend .shift {
            color: #c0392b;
        }

        .day-cell.weekend.selected .shift {
            color: #ffcccc;
        }

        .day-notes-preview {
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: 5px;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            flex-grow: 1;
        }

        .day-cell.selected .day-notes-preview {
            color: #e0e0e0;
        }

        .day-cell.weekend .day-notes-preview {
            color: #c0392b;
        }

        .day-cell.weekend.selected .day-notes-preview {
            color: #ffcccc;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .selected-date {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .note-form {
            margin-bottom: 20px;
        }

        .note-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 10px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        .note-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .add-note-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-note-btn:hover {
            background-color: #27ae60;
        }

        .notes-list {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 5px;
        }

        .note-item {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .note-text {
            flex-grow: 1;
            word-break: break-word;
        }

        .note-date {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .note-actions {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .edit-note-btn, .delete-note-btn {
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-note-btn {
            background-color: #3498db;
        }

        .edit-note-btn:hover {
            background-color: #2980b9;
        }

        .delete-note-btn {
            background-color: #e74c3c;
        }

        .delete-note-btn:hover {
            background-color: #c0392b;
        }

        .empty-notes {
            text-align: center;
            color: #7f8c8d;
            padding: 40px 20px;
            font-style: italic;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(150%);
            transition: transform 0.5s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            font-size: 1.2rem;
        }

        /* Стили для печати */
        @media print {
            body * {
                visibility: hidden;
            }
            
            .print-content, .print-content * {
                visibility: visible;
            }
            
            .print-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 15px;
                font-size: 12px;
            }
            
            .no-print {
                display: none !important;
            }
            
            .calendar-print {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
                margin-bottom: 15px;
            }
            
            .day-cell-print {
                border: 1px solid #ddd !important;
                padding: 8px 4px;
                min-height: 70px;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                position: relative;
                page-break-inside: avoid;
                background-color: #f8f9fa;
            }
            
            .day-cell-print.weekend {
                background-color: #fff5f5;
            }
            
            .day-number-print {
                font-size: 0.9rem;
                font-weight: 600;
                margin-bottom: 2px;
            }
            
            .shift-print {
                font-size: 0.65rem;
                color: #555;
                margin-top: 1px;
            }
            
            .notes-preview-print {
                font-size: 0.65rem;
                color: #7f8c8d;
                text-align: left;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                flex-grow: 1;
            }
            
            .notes-count-print {
                background-color: #2ecc71;
                color: white;
                border-radius: 50%;
                width: 16px;
                height: 16px;
                font-size: 0.6rem;
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 3px;
                right: 3px;
            }
            
            .day-cell-print.weekend .notes-count-print {
                background-color: #e74c3c;
            }
            
            .employees-list {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                margin-top: 20px;
                page-break-inside: avoid;
            }
            
            .employee-item {
                font-size: 0.7rem;
                padding: 3px;
                border-bottom: 1px dotted #ddd;
            }
            
            .print-header {
                text-align: center;
                margin-bottom: 10px;
                border-bottom: 2px solid #3498db;
                padding-bottom: 8px;
            }
            
            .print-title {
                font-size: 1.2rem;
                font-weight: bold;
                color: #2c3e50;
                margin-bottom: 5px;
            }
            
            .print-date {
                font-size: 1rem;
                color: #7f8c8d;
            }
            
            .print-footer {
                text-align: center;
                margin-top: 15px;
                font-size: 0.7rem;
                color: #7f8c8d;
                border-top: 1px solid #eee;
                padding-top: 8px;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
            }
            
            .day-cell {
                min-height: 70px;
                padding: 8px 4px;
            }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .print-btn {
                align-self: center;
            }
            
            .day-notes-preview {
                font-size: 0.7rem;
                -webkit-line-clamp: 2;
            }
            
            .note-actions {
                flex-direction: column;
            }
        }

        .day-cell.other-month {
            color: #bdc3c7;
            background-color: #f9f9f9;
        }

        .day-cell.other-month:hover {
            background-color: #f0f0f0;
        }

        .day-cell.other-month.weekend {
            background-color: #fff0f0;
        }

        .notes-count {
            background-color: #2ecc71;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 5px;
            right: 5px;
        }

        .day-cell.weekend .notes-count {
            background-color: #e74c3c;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #7f8c8d;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close-modal:hover {
            color: #e74c3c;
        }
        
        .modal-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        .modal-textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .save-btn, .cancel-btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s;
            border: none;
        }
        
        .save-btn {
            background-color: #2ecc71;
            color: white;
        }
        
        .save-btn:hover {
            background-color: #27ae60;
        }
        
        .cancel-btn {
            background-color: #e74c3c;
            color: white;
        }
        
        .cancel-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-calendar-alt"></i> Календарь с НСО</h1>
                <!-- Подзаголовок удалён по требованию -->
            </div>
            <button class="print-btn no-print" id="print-btn">
                <i class="fas fa-print"></i> Распечатать календарь
            </button>
        </header>
        
        <div class="app-container">
            <section class="calendar-section">
                <div class="calendar-header">
                    <button class="nav-button no-print" id="prev-month"><i class="fas fa-chevron-left"></i></button>
                    <div class="current-month" id="current-month">Май 2023</div>
                    <button class="nav-button no-print" id="next-month"><i class="fas fa-chevron-right"></i></button>
                </div>
                
                <div class="calendar-grid" id="calendar-grid">
                    <div class="day-name">Пн</div>
                    <div class="day-name">Вт</div>
                    <div class="day-name">Ср</div>
                    <div class="day-name">Чт</div>
                    <div class="day-name">Пт</div>
                    <div class="day-name weekend">Сб</div>
                    <div class="day-name weekend">Вс</div>
                </div>
            </section>
            
            <section class="notes-section">
                <div class="notes-header">
                    <div class="selected-date" id="selected-date">15 мая 2023</div>
                </div>
                
                <div class="note-form">
                    <textarea class="note-input" id="note-input" placeholder="Введите вашу заметку для этого дня..."></textarea>
                    <button class="add-note-btn no-print" id="add-note-btn">
                        <i class="fas fa-plus"></i> Добавить заметку
                    </button>
                </div>
                
                <div class="notes-list" id="notes-list">
                    <div class="empty-notes">Нет заметок для этого дня. Добавьте первую заметку!</div>
                </div>
            </section>
        </div>
        
        <div class="footer no-print">
            <p>© 2023 Календарь с НСО | Все заметки сохраняются локально</p>
        </div>
        
        <div class="notification" id="notification">
            <i class="fas fa-check-circle notification-icon"></i>
            <span class="notification-text">Заметка успешно добавлена!</span>
        </div>
        
        <div class="modal-overlay" id="edit-modal">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">Редактировать заметку</div>
                    <button class="close-modal" id="close-modal">&times;</button>
                </div>
                <textarea class="modal-textarea" id="edit-note-text"></textarea>
                <div class="modal-actions">
                    <button class="cancel-btn" id="cancel-edit">Отмена</button>
                    <button class="save-btn" id="save-edit">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = new Date();
        let notes = {};
        let currentEditNoteIndex = -1;
        let currentEditDateKey = '';

        // Обновлённый список сотрудников
        const employeesList = [
            "1ПЗ 1н Сафин Ильназ Рависович",
            "1ПЗ 2н Ваганова Эльвира Анатольевна",
            "1ПЗ 3н Кузьмина Светлана Павловна",
            "1ПЗ 4н Глазунова Ирина Николаевна",
            "2ПЗ 1н Кудряшова Гузель Фаритовна",
            "2ПЗ 2н Шайдуллина Гюзелия Тауфовна",
            "2ПЗ 3н Хегай Эльвира Ядкаровна",
            "2ПЗ 4н Бармалеев Виталий Геннадиевич",
            "СЦ 1н Мухаремова Ольга Николаевна",
            "СЦ 2н Галиев Рашат Азатович",
            "СЦ 3н Газиева Светлана Владимировна",
            "СЦ 4н Галиев Рашат Азатович",
            "гр.Т. 1н Ахмадуллина Гузель Магтасимовна",
            "гр.Т. 2н Андрианов Дмитрий Владимирович",
            "гр.Т. 3н Шарифуллина Ольга Николаевна",
            "гр.Т. 4н Гурьянов Евгений Иванович",
            "ДЧ 1н Корнеева Юлия Владимировна",
            "ДЧ 2н Бондарева Елена Владимировна",
            "ДЧ 3н Зайнетдинова Любовь Юсуповна",
            "ДЧ 4н Фатихова Светлана Вячеславовна"
        ];

        // Функция для получения текста смены по дню месяца
        // Чередование: 1 мая - 3н, 2 мая - 4н, 3 мая - 1н, 4 мая - 2н, 5 мая - 3н и т.д.
        function getShiftText(dayNumber) {
            const shiftPattern = ['3н', '4н', '1н', '2н'];
            const index = (dayNumber - 1) % 4;
            return shiftPattern[index];
        }

        function loadNotes() {
            const savedNotes = localStorage.getItem('calendarNotes');
            if (savedNotes) notes = JSON.parse(savedNotes);
        }
        
        function saveNotes() {
            localStorage.setItem('calendarNotes', JSON.stringify(notes));
        }
        
        function getDateKey(date) {
            return `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`;
        }
        
        function getMonthName(monthIndex) {
            const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
            return months[monthIndex];
        }
        
        function getDayName(dayIndex) {
            const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            return days[dayIndex];
        }
        
        function isWeekend(date) {
            const day = date.getDay();
            return day === 0 || day === 6;
        }
        
        function getFirstNotePreview(dateKey) {
            const dayNotes = notes[dateKey] || [];
            if (dayNotes.length === 0) return '';
            const lastNote = dayNotes[dayNotes.length - 1];
            let noteText = lastNote.text;
            if (noteText.length > 50) noteText = noteText.substring(0, 47) + '...';
            return noteText;
        }
        
        function formatDate(date) {
            const day = date.getDate();
            const month = getMonthName(date.getMonth());
            const year = date.getFullYear();
            const dayOfWeek = getDayName(date.getDay());
            return `${day} ${month} ${year}, ${dayOfWeek}`;
        }
        
        function showNotification(message) {
            const notification = document.getElementById('notification');
            const notificationText = notification.querySelector('.notification-text');
            notificationText.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }
        
        function openEditModal(noteIndex, dateKey) {
            currentEditNoteIndex = noteIndex;
            currentEditDateKey = dateKey;
            const dayNotes = notes[dateKey] || [];
            if (dayNotes.length <= noteIndex) return;
            document.getElementById('edit-note-text').value = dayNotes[noteIndex].text;
            document.getElementById('edit-modal').classList.add('active');
            setTimeout(() => document.getElementById('edit-note-text').focus(), 100);
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            currentEditNoteIndex = -1;
            currentEditDateKey = '';
            document.getElementById('edit-note-text').value = '';
        }
        
        function saveEditedNote() {
            const editedText = document.getElementById('edit-note-text').value.trim();
            if (editedText === '') {
                alert('Заметка не может быть пустой');
                return;
            }
            if (currentEditNoteIndex === -1 || !currentEditDateKey) return;
            const dayNotes = notes[currentEditDateKey];
            if (!dayNotes || dayNotes.length <= currentEditNoteIndex) return;
            dayNotes[currentEditNoteIndex].text = editedText;
            dayNotes[currentEditNoteIndex].timestamp = new Date().toISOString();
            saveNotes();
            renderCalendar();
            renderNotes();
            showNotification('Заметка успешно отредактирована!');
            closeEditModal();
        }
        
        function renderCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const currentMonthElement = document.getElementById('current-month');
            
            while (calendarGrid.children.length > 7) calendarGrid.removeChild(calendarGrid.lastChild);
            
            currentMonthElement.textContent = `${getMonthName(currentDate.getMonth())} ${currentDate.getFullYear()}`;
            
            const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const lastDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            let firstDayOfWeek = firstDayOfMonth.getDay();
            firstDayOfWeek = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;
            const daysInMonth = lastDayOfMonth.getDate();
            
            for (let i = 0; i < firstDayOfWeek; i++) {
                const prevMonthDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), -i);
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell other-month';
                if (isWeekend(prevMonthDay)) dayCell.classList.add('weekend');
                dayCell.innerHTML = `<div class="day-number">${prevMonthDay.getDate()}</div>`;
                calendarGrid.appendChild(dayCell);
            }
            
            const today = new Date();
            const todayKey = getDateKey(today);
            const selectedKey = getDateKey(selectedDate);
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                const dateKey = getDateKey(date);
                const isWeekendDay = isWeekend(date);
                const shiftText = getShiftText(day);
                
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                if (isWeekendDay) dayCell.classList.add('weekend');
                if (dateKey === todayKey) dayCell.classList.add('today');
                if (dateKey === selectedKey) dayCell.classList.add('selected');
                
                const dayNotes = notes[dateKey] || [];
                const notesCount = dayNotes.length;
                const notePreview = getFirstNotePreview(dateKey);
                
                dayCell.innerHTML = `
                    <div class="day-number">${day}</div>
                    <div class="shift">${shiftText}</div>
                    ${notesCount > 0 ? `<div class="day-notes-preview">${notePreview}</div>` : ''}
                    ${notesCount > 1 ? `<div class="notes-count">${notesCount}</div>` : ''}
                `;
                
                dayCell.addEventListener('click', () => {
                    selectedDate = date;
                    renderCalendar();
                    renderNotes();
                });
                calendarGrid.appendChild(dayCell);
            }
            
            const totalCells = 42;
            const daysAdded = firstDayOfWeek + daysInMonth;
            const nextMonthDays = totalCells - daysAdded;
            for (let i = 1; i <= nextMonthDays; i++) {
                const nextMonthDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, i);
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell other-month';
                if (isWeekend(nextMonthDate)) dayCell.classList.add('weekend');
                dayCell.innerHTML = `<div class="day-number">${i}</div>`;
                calendarGrid.appendChild(dayCell);
            }
        }
        
        function renderNotes() {
            const selectedDateElement = document.getElementById('selected-date');
            const notesList = document.getElementById('notes-list');
            const noteInput = document.getElementById('note-input');
            selectedDateElement.textContent = formatDate(selectedDate);
            notesList.innerHTML = '';
            const dateKey = getDateKey(selectedDate);
            let dayNotes = notes[dateKey] || [];
            if (dayNotes.length === 0) {
                notesList.innerHTML = '<div class="empty-notes">Нет заметок для этого дня. Добавьте первую заметку!</div>';
                return;
            }
            dayNotes = [...dayNotes].reverse();
            dayNotes.forEach((note, idx) => {
                const realIndex = (notes[dateKey] || []).length - 1 - idx;
                const noteItem = document.createElement('div');
                noteItem.className = 'note-item';
                const noteDate = new Date(note.timestamp);
                const timeString = noteDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                noteItem.innerHTML = `
                    <div class="note-text">
                        ${note.text}
                        <div class="note-date">${timeString}</div>
                    </div>
                    <div class="note-actions">
                        <button class="edit-note-btn no-print" data-index="${realIndex}"><i class="fas fa-edit"></i></button>
                        <button class="delete-note-btn no-print" data-index="${realIndex}"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                noteItem.querySelector('.edit-note-btn').addEventListener('click', (e) => {
                    const idxVal = parseInt(e.currentTarget.getAttribute('data-index'));
                    openEditModal(idxVal, dateKey);
                });
                noteItem.querySelector('.delete-note-btn').addEventListener('click', (e) => {
                    const idxVal = parseInt(e.currentTarget.getAttribute('data-index'));
                    deleteNote(idxVal);
                });
                notesList.appendChild(noteItem);
            });
            noteInput.value = '';
        }
        
        function addNote() {
            const noteInput = document.getElementById('note-input');
            const noteText = noteInput.value.trim();
            if (noteText === '') {
                alert('Введите текст заметки');
                return;
            }
            const dateKey = getDateKey(selectedDate);
            if (!notes[dateKey]) notes[dateKey] = [];
            notes[dateKey].push({ text: noteText, timestamp: new Date().toISOString() });
            saveNotes();
            renderCalendar();
            renderNotes();
            showNotification('Заметка успешно добавлена!');
            noteInput.focus();
        }
        
        function deleteNote(index) {
            const dateKey = getDateKey(selectedDate);
            if (notes[dateKey] && notes[dateKey].length > index) {
                notes[dateKey].splice(index, 1);
                if (notes[dateKey].length === 0) delete notes[dateKey];
                saveNotes();
                renderCalendar();
                renderNotes();
                showNotification('Заметка удалена!');
            }
        }
        
        function printCalendar() {
            const printWindow = window.open('', '_blank');
            const monthName = getMonthName(currentDate.getMonth());
            const year = currentDate.getFullYear();
            const today = new Date().toLocaleDateString('ru-RU');
            let printHTML = `
                <!DOCTYPE html>
                <html lang="ru">
                <head><meta charset="UTF-8"><title>Календарь ${monthName} ${year}</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; padding: 10px; font-size: 12px; }
                    .print-content { width: 100%; }
                    .print-header { text-align: center; border-bottom: 2px solid #3498db; margin-bottom: 10px; }
                    .print-title { font-size: 1.2rem; font-weight: bold; }
                    .calendar-print { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 15px; }
                    .day-name-print { text-align: center; padding: 8px 2px; font-weight: 600; background: #f0f0f0; }
                    .day-name-print.weekend { background: #ffeaea; color:#e74c3c; }
                    .day-cell-print { border:1px solid #ddd; padding:6px 3px; min-height:70px; background:#f8f9fa; position:relative; }
                    .day-cell-print.weekend { background:#fff5f5; }
                    .day-number-print { font-size:0.9rem; font-weight:600; }
                    .shift-print { font-size:0.65rem; color:#555; margin-top:2px; }
                    .notes-preview-print { font-size:0.65rem; color:#7f8c8d; margin-top:3px; }
                    .notes-count-print { background:#2ecc71; color:white; border-radius:50%; width:16px; height:16px; font-size:0.6rem; display:flex; align-items:center; justify-content:center; position:absolute; top:3px; right:3px; }
                    .employees-container { margin-top:15px; }
                    .employees-title { font-weight:bold; border-bottom:1px solid #3498db; margin-bottom:8px; }
                    .employees-list { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
                    .employee-item { font-size:0.7rem; padding:3px; border-bottom:1px dotted #ddd; }
                    .print-footer { text-align:center; margin-top:15px; font-size:0.7rem; border-top:1px solid #eee; padding-top:8px; }
                </style>
                </head>
                <body><div class="print-content">
                <div class="print-header"><div class="print-title">Календарь с НСО</div><div class="print-date">${monthName} ${year}</div></div>
                <div class="calendar-print">
                    <div class="day-name-print">Пн</div><div class="day-name-print">Вт</div><div class="day-name-print">Ср</div>
                    <div class="day-name-print">Чт</div><div class="day-name-print">Пт</div>
                    <div class="day-name-print weekend">Сб</div><div class="day-name-print weekend">Вс</div>
            `;
            const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const lastDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            let firstDayOfWeek = firstDayOfMonth.getDay();
            firstDayOfWeek = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;
            const daysInMonth = lastDayOfMonth.getDate();
            for (let i = 0; i < firstDayOfWeek; i++) printHTML += `<div class="day-cell-print"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                const dateKey = getDateKey(date);
                const isWeekendDay = isWeekend(date);
                const shiftText = getShiftText(day);
                const dayNotes = notes[dateKey] || [];
                const notesCount = dayNotes.length;
                const notePreview = getFirstNotePreview(dateKey);
                printHTML += `
                    <div class="day-cell-print${isWeekendDay ? ' weekend' : ''}">
                        <div class="day-number-print">${day}</div>
                        <div class="shift-print">${shiftText}</div>
                        ${notesCount > 0 ? `<div class="notes-preview-print">${notePreview}</div>` : ''}
                        ${notesCount > 1 ? `<div class="notes-count-print">${notesCount}</div>` : ''}
                    </div>
                `;
            }
            printHTML += `</div><div class="employees-container"><div class="employees-title">Список сотрудников</div><div class="employees-list">`;
            employeesList.forEach(emp => { printHTML += `<div class="employee-item">${emp}</div>`; });
            printHTML += `</div></div><div class="print-footer"><p>Распечатано: ${today}</p></div></div></body></html>`;
            printWindow.document.open();
            printWindow.document.write(printHTML);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); printWindow.close(); }, 500);
        }
        
        function initApp() {
            loadNotes();
            renderCalendar();
            renderNotes();
            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
            document.getElementById('add-note-btn').addEventListener('click', addNote);
            document.getElementById('print-btn').addEventListener('click', printCalendar);
            document.getElementById('note-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && e.ctrlKey) addNote(); });
            document.getElementById('close-modal').addEventListener('click', closeEditModal);
            document.getElementById('cancel-edit').addEventListener('click', closeEditModal);
            document.getElementById('save-edit').addEventListener('click', saveEditedNote);
            document.getElementById('edit-modal').addEventListener('click', (e) => { if (e.target.id === 'edit-modal') closeEditModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditModal(); });
            selectedDate = new Date();
        }
        
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
